<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>東進受講トラッカー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="images/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <link rel="stylesheet" href="style/tokens.css">
  <link rel="stylesheet" href="style/base.css">
  <link rel="stylesheet" href="style/components.css">
</head>
<body>

<!-- ============================
     Auth Screen
============================= -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-mark">T</div>
      <span class="auth-logo-text">東進受講トラッカー</span>
    </div>
    <h2>ログイン</h2>
    <p class="sub">東進のアカウントで同期されます</p>
    <div id="auth-error" class="auth-error hidden"></div>
    <form id="auth-form" class="auth-form">
      <label>
        メールアドレス
        <input type="email" id="auth-email" required placeholder="your@email.com" autocomplete="email">
      </label>
      <label>
        パスワード
        <input type="password" id="auth-password" required placeholder="パスワード" autocomplete="current-password">
      </label>
      <button type="submit" id="auth-submit" class="btn btn-primary" style="width:100%;margin-top:4px;">ログイン</button>
    </form>
    <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--ink-3);">
      アカウントをお持ちでない場合
      <button type="button" id="auth-toggle" class="btn btn-ghost" style="font-size:13px;padding:4px 8px;min-height:auto;">新規登録</button>
    </div>
    <div style="text-align:center;margin-top:10px;">
      
    </div>
  </div>
</div>

<!-- ============================
     App Layout
============================= -->
<div id="app-layout" class="app-layout">

  <!-- Top nav (desktop) -->
  <nav class="topnav">
    <div class="topnav-inner">
      <a href="home.html" class="nav-logo">
        <div class="nav-logo-mark">T</div>
        東進受講トラッカー
      </a>
      <div class="nav-links">
        <a href="home.html"    class="nav-link active">ホーム</a>
        <a href="courses.html"  class="nav-link">講座別進捗</a>
        <a href="masters.html"  class="nav-link">高速基礎マスター</a>
        <a href="calendar.html" class="nav-link">カレンダー</a>
      </div>
      <div class="spacer"></div>
      
      <button id="logout-btn" class="btn btn-ghost" style="font-size:13px;padding:6px 12px;">ログアウト</button>
    </div>
  </nav>

  <!-- Main -->
  <main class="main-content">

    <!-- Loading -->
    <div id="loading-overlay" class="loading-overlay">
      <div class="spinner"></div>
      <span>読み込み中...</span>
    </div>

    <!-- Content -->
    <div id="home-content" class="hidden">

      <!-- Page header -->
      <div class="page-header">
        <div>
          <h1>ダッシュボード</h1>
          <p class="sub">受講全体の進捗と今月の目標を確認</p>
        </div>
        <div class="flex">
          <select id="month-select" class="form-select" style="width:auto;"></select>
          <button id="add-course-btn" class="btn btn-primary">＋ 講座追加</button>
        </div>
      </div>

      <!-- KPI row -->
      <div class="kpi-grid">
        <div class="kpi-card accent">
          <div class="kpi-label">全体完了率</div>
          <div class="kpi-value"><span id="kpi-total-pct">0</span><span>%</span></div>
          <div class="progress-bar" style="margin-top:10px;height:5px;">
            <div id="overall-progress-fill" class="progress-fill" style="width:0%"></div>
          </div>
          <div style="font-size:11px;color:var(--ink-3);margin-top:6px;"><span id="kpi-completed">0</span> / <span id="kpi-total-units">0</span> コマ</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">今月の予定コマ</div>
          <div class="kpi-value"><span id="kpi-this-month">0</span><span>コマ</span></div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">来月の予定コマ</div>
          <div class="kpi-value"><span id="kpi-next-month">0</span><span>コマ</span></div>
        </div>
      </div>

      <!-- Two-column layout -->
      <div class="two-col" style="gap:20px;">

        <!-- Left: course progress -->
        <div>
          <div class="section-title">講座別進捗</div>
          <div id="course-progress-list" style="display:flex;flex-direction:column;gap:12px;"></div>
        </div>

        <!-- Right: monthly goals + exams -->
        <div style="display:flex;flex-direction:column;gap:20px;">

          <!-- Monthly goals -->
          <div class="card">
            <div class="section-title" style="margin-bottom:0;">
              今月の目標達成状況
              <span id="overall-pct-label" style="float:right;font-size:14px;font-weight:700;color:var(--green-dark);letter-spacing:0;text-transform:none;"></span>
            </div>
            <div id="monthly-goals-summary" style="margin-top:12px;"></div>
          </div>

          <!-- Upcoming exams -->
          <div class="card">
            <div class="section-title">直近の東進模試</div>
            <div id="upcoming-exams" style="display:flex;flex-direction:column;gap:8px;"></div>
          </div>

        </div>
      </div>

    </div>
  </main>

  <!-- Mobile bottom nav -->
  <nav class="mobile-nav">
    <div class="mobile-nav-inner">
  <a href="home.html" class="mobile-nav-item active">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V10.5z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    ホーム
  </a>
  <a href="courses.html" class="mobile-nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
      <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
    </svg>
    講座
  </a>
  <a href="masters.html" class="mobile-nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
    </svg>
    マスター
  </a>
  <a href="calendar.html" class="mobile-nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    カレンダー
  </a>
</div>
  </nav>

</div>

<!-- ============================
     Add Course Modal
============================= -->
<dialog id="add-course-modal">
  <div class="modal-header">
    <h3>講座を追加</h3>
    <button class="btn-icon modal-close">✕</button>
  </div>
  <form id="add-course-form">
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">講座名</label>
        <input id="course-name-input" class="form-input" required placeholder="例：東大対策英語">
      </div>
      <div class="form-group">
        <label class="form-label">科目</label>
        <select id="course-subject-input" class="form-select" required>
          <option value="">選択してください</option>
          <option value="英語">英語</option>
          <option value="数学">数学</option>
          <option value="国語">国語</option>
          <option value="地理">地理</option>
          <option value="世界史">世界史</option>
          <option value="現代文">現代文</option>
          <option value="古文">古文</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">総コマ数</label>
        <input id="course-units-input" class="form-input" type="number" required min="1" max="200" placeholder="例：20">
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-ghost modal-close">キャンセル</button>
      <button type="submit" class="btn btn-primary">追加する</button>
    </div>
  </form>
</dialog>

<div id="toast-container"></div>

<script type="module" src="js/home.js"></script>
</body>
</html>
