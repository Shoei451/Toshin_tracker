<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>カレンダー — 東進受講トラッカー</title>

    <link rel="icon" href="images/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
    <link rel="stylesheet" href="style/tokens.css" />
    <link rel="stylesheet" href="style/base.css" />
    <link rel="stylesheet" href="style/components.css" />
    <style>
      #auth-screen {
        display: none !important;
      }

      /* ── Calendar layout ── */
      .calendar-layout {
        display: grid;
        grid-template-columns: 1fr 260px;
        gap: 20px;
        align-items: start;
      }

      /* ── Calendar nav ── */
      .cal-nav {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      #month-label {
        font-size: 20px;
        font-weight: 700;
        color: var(--ink);
        min-width: 130px;
      }

      /* ── Calendar grid ── */
      .cal-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-md);
        overflow: hidden;
        box-shadow: var(--shadow-sm);
      }
      #calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
      }

      /* Day-of-week headers */
      .cal-dow {
        text-align: center;
        font-size: 10px;
        font-weight: 700;
        color: var(--ink-3);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        padding: 10px 4px;
        background: var(--paper);
        border-bottom: 1px solid var(--border);
      }
      .cal-dow:nth-child(6) {
        color: #2563a8;
      }
      .cal-dow:nth-child(7) {
        color: var(--danger);
      }

      /* Calendar cells */
      .cal-cell {
        min-height: 96px;
        border-right: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        padding: 6px 6px 4px;
        cursor: pointer;
        transition: background var(--t-fast);
        position: relative;
        vertical-align: top;
      }
      .cal-cell:nth-child(7n) {
        border-right: none;
      }
      .cal-cell:hover {
        background: var(--paper);
      }
      .cal-cell.empty {
        background: var(--paper);
        opacity: 0.4;
        cursor: default;
        pointer-events: none;
      }
      .cal-cell.today {
        background: var(--green-light);
      }
      .cal-cell.today .cal-date {
        background: var(--green);
        color: white;
        border-radius: 50%;
      }
      .cal-cell.sat .cal-date {
        color: #2563a8;
      }
      .cal-cell.sun .cal-date {
        color: var(--danger);
      }
      .cal-cell.has-events {
        background: rgba(0, 156, 136, 0.03);
      }

      .cal-date {
        font-size: 12px;
        font-weight: 600;
        color: var(--ink-2);
        width: 24px;
        height: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 3px;
        line-height: 1;
      }

      /* Event chips in cell */
      .cal-chips {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .cal-chip {
        font-size: 10px;
        font-weight: 600;
        padding: 2px 5px;
        border-radius: 3px;
        background: var(--green-light);
        color: var(--green-dark);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        cursor: pointer;
        transition: filter var(--t-fast);
        line-height: 1.4;
      }
      .cal-chip:hover {
        filter: brightness(0.92);
      }
      .cal-chip.done {
        background: var(--green);
        color: white;
      }
      .cal-chip.exam {
        background: rgba(0, 156, 136, 0.15);
        color: #007a6d;
        font-weight: 700;
      }
      .cal-more {
        font-size: 10px;
        color: var(--ink-3);
        font-weight: 600;
        padding: 1px 5px;
      }

      /* ── Summary sidebar ── */
      .summary-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-md);
        box-shadow: var(--shadow-sm);
        overflow: hidden;
        position: sticky;
        top: 72px;
      }
      .summary-header {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        font-weight: 700;
        color: var(--ink-2);
      }
      .summary-stats {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        border-bottom: 1px solid var(--border);
      }
      .summary-stat {
        padding: 12px 10px;
        text-align: center;
        border-right: 1px solid var(--border);
      }
      .summary-stat:last-child {
        border-right: none;
      }
      .summary-stat .val {
        font-size: 20px;
        font-weight: 700;
        color: var(--ink);
        line-height: 1;
      }
      .summary-stat .lbl {
        font-size: 10px;
        color: var(--ink-3);
        margin-top: 3px;
      }

      /* Schedule list in sidebar */
      #scheduled-list {
        max-height: 420px;
        overflow-y: auto;
      }
      .schedule-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
      }
      .schedule-item:last-child {
        border-bottom: none;
      }
      .schedule-item.done {
        opacity: 0.6;
      }
      .schedule-date {
        font-size: 12px;
        font-weight: 600;
        color: var(--ink-3);
        white-space: nowrap;
        min-width: 36px;
      }
      .schedule-label {
        flex: 1;
        font-size: 12px;
        color: var(--ink);
        line-height: 1.3;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .schedule-badge {
        font-size: 10px;
        font-weight: 600;
        padding: 1px 6px;
        border-radius: 99px;
        white-space: nowrap;
      }
      .schedule-badge.done {
        background: var(--green-light);
        color: var(--green-dark);
      }
      .schedule-badge.exam {
        background: rgba(0, 156, 136, 0.12);
        color: #007a6d;
      }

      /* ── Day modal ── */
      .day-event-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
      }
      .day-event-item:last-child {
        border-bottom: none;
      }
      .day-event-icon {
        font-size: 18px;
        flex-shrink: 0;
      }
      .day-event-label {
        flex: 1;
        font-size: 14px;
        font-weight: 500;
        color: var(--ink);
      }
      .day-event-item.done .day-event-label {
        color: var(--green-dark);
      }
      .day-event-item.exam .day-event-label {
        color: #007a6d;
      }

      /* ── Legend ── */
      .cal-legend {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .cal-legend-item {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        color: var(--ink-3);
      }
      .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 2px;
        flex-shrink: 0;
      }

      /* ── Responsive ── */
      @media (max-width: 900px) {
        .calendar-layout {
          grid-template-columns: 1fr;
        }
        .summary-card {
          position: static;
        }
        #scheduled-list {
          max-height: 200px;
        }
      }

      @media (max-width: 600px) {
        .cal-cell {
          min-height: 64px;
          padding: 4px 3px 3px;
        }
        .cal-date {
          font-size: 11px;
          width: 20px;
          height: 20px;
        }
        .cal-chip {
          font-size: 9px;
          padding: 1px 4px;
        }
        #month-label {
          font-size: 17px;
          min-width: 110px;
        }
        .summary-stats {
          grid-template-columns: 1fr 1fr 1fr;
        }
        .summary-stat .val {
          font-size: 18px;
        }
      }

      @media (max-width: 400px) {
        .cal-cell {
          min-height: 52px;
        }
        .cal-chip {
          display: none;
        }
        .cal-cell.has-events::after {
          content: "";
          display: block;
          width: 5px;
          height: 5px;
          background: var(--green);
          border-radius: 50%;
          margin: 1px auto 0;
        }
      }
    </style>
  </head>
  <body>
    <!-- Auth -->
    <div id="auth-screen">
      <div class="auth-card">
        <div class="auth-logo">
          <div class="auth-logo-mark">T</div>
          <span class="auth-logo-text">東進受講トラッカー</span>
        </div>
        <h2>ログイン</h2>
        <p class="sub">東進のアカウントで同期されます</p>
        <div id="auth-error" class="auth-error hidden"></div>
        <form id="auth-form" class="auth-form">
          <label
            >メールアドレス<input
              type="email"
              id="auth-email"
              required
              placeholder="your@email.com"
              autocomplete="email"
          /></label>
          <label
            >パスワード<input
              type="password"
              id="auth-password"
              required
              placeholder="パスワード"
              autocomplete="current-password"
          /></label>
          <button
            type="submit"
            id="auth-submit"
            class="btn btn-primary"
            style="width: 100%; margin-top: 4px"
          >
            ログイン
          </button>
        </form>
        <div
          style="
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: var(--ink-3);
          "
        >
          アカウントをお持ちでない場合
          <button
            type="button"
            id="auth-toggle"
            class="btn btn-ghost"
            style="font-size: 13px; padding: 4px 8px; min-height: auto"
          >
            新規登録
          </button>
        </div>
      </div>
    </div>

    <!-- App -->
    <div id="app-layout" class="app-layout">
      <nav class="topnav">
        <div class="topnav-inner">
          <a href="home.html" class="nav-logo">
            <div class="nav-logo-mark">T</div>
            東進受講トラッカー
          </a>
          <div class="nav-links">
            <a href="home.html" class="nav-link">ホーム</a>
            <a href="courses.html" class="nav-link">講座別進捗</a>
            <a href="masters.html" class="nav-link">高速基礎マスター</a>
            <a href="calendar.html" class="nav-link active">カレンダー</a>
          </div>
          <div class="spacer"></div>

          <button
            id="logout-btn"
            class="btn btn-ghost"
            style="font-size: 13px; padding: 6px 12px"
          >
            ログアウト
          </button>
        </div>
      </nav>

      <main class="main-content">
        <div id="loading-overlay" class="loading-overlay">
          <div class="spinner"></div>
          <span>読み込み中...</span>
        </div>

        <div id="calendar-content" class="hidden">
          <div class="page-header" style="margin-bottom: 16px">
            <div>
              <h1>カレンダー</h1>
              <p class="sub">受講予定日と東進模試を確認する</p>
            </div>
          </div>

          <!-- Legend -->
          <div class="cal-legend">
            <div class="cal-legend-item">
              <div
                class="legend-dot"
                style="
                  background: var(--green-light);
                  border: 1px solid var(--green);
                "
              ></div>
              受講予定
            </div>
            <div class="cal-legend-item">
              <div class="legend-dot" style="background: var(--green)"></div>
              受講完了
            </div>
            <div class="cal-legend-item">
              <div
                class="legend-dot"
                style="
                  background: rgba(0, 156, 136, 0.15);
                  border: 1px solid #009c88;
                "
              ></div>
              東進模試
            </div>
          </div>

          <div class="calendar-layout">
            <!-- Calendar -->
            <div>
              <!-- Nav -->
              <div class="cal-nav">
                <button id="prev-btn" class="btn-icon">‹</button>
                <button id="next-btn" class="btn-icon">›</button>
                <span id="month-label"></span>
                <button
                  id="today-btn"
                  class="btn btn-ghost"
                  style="font-size: 13px; padding: 6px 12px; margin-left: 4px"
                >
                  今日
                </button>
              </div>

              <!-- Grid -->
              <div class="cal-wrap">
                <div id="calendar-grid">
                  <!-- Day of week headers -->
                  <div class="cal-dow">月</div>
                  <div class="cal-dow">火</div>
                  <div class="cal-dow">水</div>
                  <div class="cal-dow">木</div>
                  <div class="cal-dow">金</div>
                  <div class="cal-dow">土</div>
                  <div class="cal-dow">日</div>
                </div>
              </div>
            </div>

            <!-- Summary sidebar -->
            <div class="summary-card">
              <div class="summary-header">今月のサマリー</div>
              <div class="summary-stats">
                <div class="summary-stat">
                  <div class="val" id="summary-scheduled">0</div>
                  <div class="lbl">予定</div>
                </div>
                <div class="summary-stat">
                  <div class="val" id="summary-done">0</div>
                  <div class="lbl">完了</div>
                </div>
                <div class="summary-stat">
                  <div class="val" id="summary-exams">0</div>
                  <div class="lbl">模試</div>
                </div>
              </div>
              <div id="scheduled-list"></div>
            </div>
          </div>
        </div>
      </main>

      <nav class="mobile-nav">
        <div class="mobile-nav-inner">
          <a href="home.html" class="mobile-nav-item">
            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V10.5z"
              />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            ホーム
          </a>
          <a href="courses.html" class="mobile-nav-item">
            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
            </svg>
            講座
          </a>
          <a href="masters.html" class="mobile-nav-item">
            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
            </svg>
            マスター
          </a>
          <a href="calendar.html" class="mobile-nav-item active">
            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
            カレンダー
          </a>
        </div>
      </nav>
    </div>

    <!-- Day modal -->
    <dialog id="day-modal">
      <div class="modal-header">
        <h3 id="day-modal-title"></h3>
        <button class="btn-icon modal-close">✕</button>
      </div>
      <div class="modal-body" id="day-modal-body"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost modal-close">閉じる</button>
      </div>
    </dialog>

    <div id="toast-container"></div>
    <script type="module" src="js/calendar.js"></script>
  </body>
</html>
